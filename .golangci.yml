version: "2"

linters:
  default: standard
  enable:
    - gosec
    - gocritic
    - revive
    - lll
    - nolintlint

  settings:
    lll:
      line-length: 180
    gosec:
      excludes:
        - G304
        - G703
    revive:
      rules:
        - name: exported
          disabled: true

  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - gosec
          - lll

run:
  go: "1.23"
  concurrency: 2
